<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13243A"/>
      <stop offset="100%" stop-color="#2764D8"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14A8A0"/>
      <stop offset="55%" stop-color="#7357D9"/>
      <stop offset="100%" stop-color="#E8AA32"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background (no corner rounding; OS applies its own mask shape) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bgGrad)"/>

  <!-- All important content scaled to ~80% and centered inside the safe zone -->
  <g transform="translate(256 256) scale(0.8) translate(-256 -256)">
    <!-- Subtle timeline arc (past -> future) with gold accents -->
    <path d="M 96 340 Q 256 420 416 260" fill="none" stroke="url(#arcGrad)" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
    <circle cx="96" cy="340" r="9" fill="#14A8A0"/>
    <circle cx="416" cy="260" r="10" fill="#E8AA32"/>

    <!-- Small document / page shape, tucked behind the S, upper-left -->
    <g opacity="0.9">
      <rect x="118" y="118" width="86" height="108" rx="10" fill="#FFFFFF" opacity="0.14"/>
      <rect x="134" y="140" width="54" height="7" rx="3.5" fill="#FFFFFF" opacity="0.4"/>
      <rect x="134" y="160" width="54" height="7" rx="3.5" fill="#FFFFFF" opacity="0.4"/>
      <rect x="134" y="180" width="34" height="7" rx="3.5" fill="#FFFFFF" opacity="0.4"/>
    </g>

    <!-- AI neural nodes network, upper-right -->
    <g stroke="#FFFFFF" stroke-width="3" opacity="0.55">
      <line x1="368" y1="120" x2="404" y2="150"/>
      <line x1="404" y1="150" x2="392" y2="196"/>
      <line x1="368" y1="120" x2="336" y2="150"/>
      <line x1="336" y1="150" x2="392" y2="196"/>
    </g>
    <circle cx="368" cy="120" r="9" fill="#7357D9"/>
    <circle cx="404" cy="150" r="7" fill="#14A8A0"/>
    <circle cx="336" cy="150" r="7" fill="#E8AA32"/>
    <circle cx="392" cy="196" r="8" fill="#FFFFFF"/>

    <!-- Geometric white "S" formed from rounded strokes, centered -->
    <g transform="translate(256 268)">
      <path d="M 62 -108
               C -18 -108 -70 -78 -70 -34
               C -70 6 -30 24 8 34
               C 46 44 70 56 70 82
               C 70 110 34 128 -8 128
               C -46 128 -78 114 -96 92"
            fill="none"
            stroke="#FFFFFF"
            stroke-width="46"
            stroke-linecap="round"
            stroke-linejoin="round"/>
    </g>

    <!-- small connected node markers along the S terminals -->
    <circle cx="204" cy="152" r="12" fill="#E8AA32"/>
    <circle cx="308" cy="388" r="12" fill="#14A8A0"/>
  </g>
</svg>
